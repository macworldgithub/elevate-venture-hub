<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Britannica</title>

    <meta
      name="description"
      content="Britannica – Your trusted source for knowledge and reference"
    />
    <meta name="author" content="Britannica" />

    <!-- Open Graph / Facebook, LinkedIn, etc. -->
    <meta property="og:title" content="Britannica" />
    <meta
      property="og:description"
      content="Explore in-depth articles, facts, and reliable information on thousands of topics"
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <!-- Recommended: place a 1200×630 image named og-image.png in the public/ folder -->

    <!-- Twitter/X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Britannica" />
    <meta
      name="twitter:description"
      content="Explore in-depth articles, facts, and reliable information on thousands of topics"
    />
    <meta name="twitter:image" content="/og-image.png" />
    <!-- Optional: <meta name="twitter:site" content="@Britannica" /> -->

    <!-- Basic favicon now uses shield icon -->
    <link rel="icon" href="/shield.svg" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
